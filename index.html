<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Agro Hara · Lançamento de Promotores</title>
<style>
  :root{
    --azul:#3d8b28;
    --azul-claro:#4fa738;
    --verde-escuro:#1f4d2e;
    --cinza-fundo:#f4f7f3;
    --cinza-borda:#d9e3d9;
    --texto:#22301f;
    --verde:#3d8b28;
    --vermelho:#c0392b;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--cinza-fundo);color:var(--texto);}
  header{background:var(--azul);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,.12);flex-wrap:wrap;gap:8px;}
  header h1{font-size:16px;margin:0;font-weight:800;text-transform:uppercase;letter-spacing:.3px;}
  header .marca{display:flex;align-items:center;gap:8px;}
  header .quem{font-size:13px;opacity:.9;font-weight:600;}
  .container{max-width:760px;margin:0 auto;padding:16px;}
  .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px;position:relative;}
  label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#44525c;}
  select, input[type=text], input[type=date], input[type=number]{
    width:100%;padding:12px 10px;font-size:16px;border:1px solid var(--cinza-borda);
    border-radius:8px;margin-bottom:16px;background:#fff;color:var(--texto);
  }
  select:focus, input:focus{outline:none;border-color:var(--azul-claro);}
  .btn{display:inline-block;width:100%;padding:14px;font-size:15px;font-weight:700;border:2px solid var(--azul);
    border-radius:24px;cursor:pointer;background:var(--azul);color:#fff;transition:background .15s;text-transform:uppercase;letter-spacing:.3px;}
  .btn:hover{background:var(--verde-escuro);border-color:var(--verde-escuro);}
  .btn:disabled{background:#9aa7b0;border-color:#9aa7b0;cursor:not-allowed;}
  .btn-secundario{background:#fff;color:var(--azul);border:2px solid var(--azul);}
  .btn-secundario:hover{background:#eef7ec;}
  .oculto{display:none !important;}
  .barra-busca{position:sticky;top:0;background:var(--cinza-fundo);padding:8px 0;z-index:5;}
  .resumo{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:10px;
    padding:12px 16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);font-size:13px;flex-wrap:wrap;gap:10px;}
  .resumo b{font-size:14px;color:var(--azul);}
  .resumo-botoes{display:flex;gap:8px;flex-wrap:wrap;}
  .resumo-botoes .btn{width:auto;padding:8px 14px;font-size:12px;}
  .msg{padding:12px 14px;border-radius:8px;font-size:14px;margin-bottom:14px;}
  .msg-erro{background:#fdecea;color:var(--vermelho);border:1px solid #f5c6c0;}
  .msg-sucesso{background:#eaf6ec;color:var(--verde);border:1px solid #bfe3c4;}
  .msg-info{background:#eef7ec;color:var(--verde-escuro);border:1px solid #cfe6c9;}
  footer{text-align:center;font-size:11px;color:#6e7d6e;padding:20px 0 40px;}
  .overlay-carregando{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;
    justify-content:center;font-size:15px;color:var(--azul);font-weight:600;z-index:50;}
  .contador{font-size:13px;color:#5b6771;margin:-6px 0 12px;}

  .sugestoes{position:absolute;left:20px;right:20px;top:auto;background:#fff;border:1px solid var(--cinza-borda);
    border-radius:10px;box-shadow:0 6px 16px rgba(0,0,0,.15);max-height:260px;overflow-y:auto;z-index:20;margin-top:-10px;}
  .sugestao-item{padding:10px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid #f0f2f0;display:flex;justify-content:space-between;gap:8px;align-items:center;}
  .sugestao-item:last-child{border-bottom:none;}
  .sugestao-item:hover{background:#eef7ec;}
  .sugestao-vazia{padding:12px 14px;font-size:13px;color:#8a9690;}
  .unidade-tag{font-size:11px;background:var(--cinza-fundo);color:#5b6771;border-radius:6px;padding:2px 6px;flex:0 0 auto;}

  .produto-chip{background:#eef7ec;color:var(--verde-escuro);border:1px solid #cfe6c9;border-radius:8px;
    padding:10px 12px;font-size:14px;font-weight:600;margin-bottom:14px;}
  .total-linha{background:var(--cinza-fundo);border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:14px;}
  .total-linha b{color:var(--azul);font-size:16px;}

  .item-carrinho{background:#fff;border:1px solid var(--cinza-borda);border-radius:10px;padding:10px 12px;
    margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .item-carrinho-info{font-size:13px;line-height:1.4;}
  .item-carrinho-detalhe{color:#5b6771;}
  .btn-remover{background:#fdecea;color:var(--vermelho);border:1px solid #f5c6c0;border-radius:8px;
    width:32px;height:32px;flex:0 0 32px;font-size:18px;cursor:pointer;line-height:1;}
  .btn-remover:hover{background:#f8d7d2;}

  .subtitulo{font-size:12px;font-weight:700;color:#5b6771;text-transform:uppercase;letter-spacing:.4px;margin:0 0 12px;}
</style>
</head>
<body>

<header>
  <div class="marca">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C9 6 5 8 5 13a7 7 0 0 0 14 0c0-5-4-7-7-11z" fill="#ffffff"/>
      <path d="M12 6.5C10.3 9 8 10.3 8 13.2A4 4 0 0 0 12 17V6.5z" fill="#3d8b28"/>
    </svg>
    <h1>Agro Hara · Lançamento de Promotores</h1>
  </div>
  <div class="quem" id="cabecalhoPromotor"></div>
</header>

<div class="container">

  <!-- TELA 1: ACESSO -->
  <section id="telaAcesso" class="card">
    <div id="msgAcesso"></div>
    <label for="selectPromotor">Selecione seu nome</label>
    <select id="selectPromotor">
      <option value="">Selecione...</option>
    </select>

    <label for="inputData">Data do lançamento</label>
    <input type="date" id="inputData">

    <button class="btn" id="btnEntrar">Entrar</button>
  </section>

  <!-- TELA 2: REVENDA -->
  <section id="telaRevenda" class="card oculto">
    <div id="msgRevenda"></div>
    <p class="subtitulo">Passo 1 de 2</p>
    <label for="selectRevenda">Selecione a revenda</label>
    <select id="selectRevenda">
      <option value="">Selecione...</option>
    </select>
    <button class="btn" id="btnContinuarRevenda">Continuar</button>
    <button class="btn btn-secundario" id="btnVoltarAcesso" style="margin-top:10px;">Voltar</button>
  </section>

  <!-- TELA 3: LANCAMENTO -->
  <section id="telaLancamento" class="oculto">
    <div class="resumo">
      <span>Revenda: <b id="resumoRevenda"></b> · Data: <b id="resumoData"></b> · Quinzena: <b id="resumoQuinzena"></b></span>
      <div class="resumo-botoes">
        <button class="btn btn-secundario" id="btnTrocarRevenda" type="button">Trocar revenda</button>
        <button class="btn btn-secundario" id="btnTrocar" type="button">Trocar tudo</button>
      </div>
    </div>

    <div id="msgLancamento"></div>

    <!-- Propriedade -->
    <div class="card">
      <p class="subtitulo">Propriedade</p>
      <label for="selectPropriedade">Escolha ou cadastre a propriedade</label>
      <select id="selectPropriedade">
        <option value="">Carregando propriedades...</option>
      </select>
      <div id="novaPropriedadeWrap" class="oculto">
        <label for="inputNovaPropriedade">Nome da nova propriedade</label>
        <input type="text" id="inputNovaPropriedade" placeholder="Ex: Propriedade Marcelo">
      </div>
    </div>

    <!-- Produto -->
    <div class="card">
      <p class="subtitulo">Produto</p>
      <label for="buscaProduto">Buscar produto</label>
      <input type="text" id="buscaProduto" placeholder="Digite para buscar o produto..." autocomplete="off">
      <div id="sugestoesProduto" class="sugestoes oculto"></div>

      <div id="produtoSelecionadoWrap" class="oculto">
        <div class="produto-chip" id="produtoChip"></div>
        <label for="inputPreco">Preço unitário (R$)</label>
        <input type="number" id="inputPreco" min="0" step="0.01" placeholder="0,00">
        <label for="inputVolume">Volume</label>
        <input type="number" id="inputVolume" min="0" step="0.01" placeholder="0,00">
        <div class="total-linha">Total: <b id="totalLinha">R$ 0,00</b></div>
        <button class="btn" id="btnAdicionarItem" type="button">Adicionar à lista</button>
      </div>
    </div>

    <!-- Carrinho -->
    <div class="card">
      <div class="contador"><span id="contadorItens">0</span> item(ns) no lançamento</div>
      <div id="listaCarrinho"></div>
      <button class="btn" id="btnEnviar" style="margin-top:12px;">Enviar lançamento</button>
    </div>
  </section>

</div>

<footer>Agro Hara · Soluções agropecuárias com ética e sustentabilidade · Uso interno</footer>
<div id="overlayCarregando" class="overlay-carregando oculto">Enviando...</div>

let promotorAtual = null;
let dataAtual = null;
let quinzenaAtual = null;
let revendaAtual = null;
let produtoSelecionado = null;
let carrinho = [];

const NOMES_MES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

function calcularQuinzena(dataISO){
  const [ano, mes, dia] = dataISO.split("-").map(Number);
  const numero = dia <= 15 ? "1ª" : "2ª";
  const nomeMes = NOMES_MES[mes-1];
  return `${numero} quinzena de ${nomeMes}/${ano}`;
}

function hojeISO(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}

function mostrarMsg(idContainer, texto, tipo){
  const el = document.getElementById(idContainer);
  const classe = tipo === "erro" ? "msg-erro" : tipo === "sucesso" ? "msg-sucesso" : "msg-info";
  el.innerHTML = `<div class="msg ${classe}">${texto}</div>`;
}
function limparMsg(idContainer){ document.getElementById(idContainer).innerHTML = ""; }

function formatarDataBR(iso){
  const [a,m,d] = iso.split("-");
  return `${d}/${m}/${a}`;
}

function formatarMoeda(v){
  return v.toLocaleString("pt-BR", {style:"currency", currency:"BRL"});
}

/* ---------- Tela 1: Acesso ---------- */
function preencherPromotores(){
  const promotores = [...new Set(PROMOTOR_CLIENTE.map(p => p.Promotor))].sort();
  const sel = document.getElementById("selectPromotor");
  promotores.forEach(p=>{
    const op = document.createElement("option");
    op.value = p; op.textContent = p;
    sel.appendChild(op);
  });
  document.getElementById("inputData").value = hojeISO();
}

document.getElementById("btnEntrar").addEventListener("click", ()=>{
  limparMsg("msgAcesso");
  const promotor = document.getElementById("selectPromotor").value;
  const data = document.getElementById("inputData").value;

  if(!promotor){ mostrarMsg("msgAcesso", "Selecione seu nome antes de continuar.", "erro"); return; }
  if(!data){ mostrarMsg("msgAcesso", "Selecione a data do lançamento.", "erro"); return; }

  promotorAtual = promotor;
  dataAtual = data;
  quinzenaAtual = calcularQuinzena(data);

  document.getElementById("cabecalhoPromotor").textContent = promotor;
  preencherRevendas(promotor);

  document.getElementById("telaAcesso").classList.add("oculto");
  document.getElementById("telaRevenda").classList.remove("oculto");
});

/* ---------- Tela 2: Revenda ---------- */
function preencherRevendas(promotor){
  const sel = document.getElementById("selectRevenda");
  sel.innerHTML = '<option value="">Selecione...</option>';
  PROMOTOR_CLIENTE.filter(p=>p.Promotor === promotor).forEach(p=>{
    const op = document.createElement("option");
    op.value = p.Cliente; op.textContent = p.Cliente;
    sel.appendChild(op);
  });
}

document.getElementById("btnVoltarAcesso").addEventListener("click", ()=>{
  document.getElementById("telaRevenda").classList.add("oculto");
  document.getElementById("telaAcesso").classList.remove("oculto");
});

document.getElementById("btnContinuarRevenda").addEventListener("click", async ()=>{
  limparMsg("msgRevenda");
  const revenda = document.getElementById("selectRevenda").value;
  if(!revenda){ mostrarMsg("msgRevenda", "Selecione a revenda antes de continuar.", "erro"); return; }

  revendaAtual = revenda;
  document.getElementById("resumoRevenda").textContent = revenda;
  document.getElementById("resumoData").textContent = formatarDataBR(dataAtual);
  document.getElementById("resumoQuinzena").textContent = quinzenaAtual;

  document.getElementById("telaRevenda").classList.add("oculto");
  document.getElementById("telaLancamento").classList.remove("oculto");

  await carregarPropriedades(revenda);
});

document.getElementById("btnTrocarRevenda").addEventListener("click", ()=>{
  document.getElementById("telaLancamento").classList.add("oculto");
  document.getElementById("telaRevenda").classList.remove("oculto");
  limparMsg("msgLancamento");
});

document.getElementById("btnTrocar").addEventListener("click", ()=>{
  carrinho = [];
  atualizarCarrinho();
  document.getElementById("telaLancamento").classList.add("oculto");
  document.getElementById("telaAcesso").classList.remove("oculto");
  document.getElementById("cabecalhoPromotor").textContent = "";
  limparMsg("msgLancamento");
});

/* ---------- Tela 3: Propriedade ---------- */
async function carregarPropriedades(revenda){
  const sel = document.getElementById("selectPropriedade");
  sel.innerHTML = '<option value="">Carregando...</option>';
  document.getElementById("novaPropriedadeWrap").classList.add("oculto");
  document.getElementById("inputNovaPropriedade").value = "";

  try{
    const resp = await fetch(`${CONFIG.URL_PROPRIEDADES}?revenda=${encodeURIComponent(revenda)}`, {
      headers: { "x-api-key": CONFIG.API_KEY }
    });
    const dados = await resp.json();
    const props = (dados && dados.propriedades) || [];
    sel.innerHTML = '<option value="">Selecione...</option>'
      + props.map(p => `<option value="${p.replace(/"/g,'&quot;')}">${p}</option>`).join('')
      + '<option value="__nova__">+ Cadastrar nova propriedade</option>';
  }catch(err){
    sel.innerHTML = '<option value="">Selecione...</option><option value="__nova__">+ Cadastrar nova propriedade</option>';
    mostrarMsg("msgLancamento", "Não foi possível carregar as propriedades já cadastradas, mas você pode cadastrar uma nova normalmente.", "info");
  }
}

document.getElementById("selectPropriedade").addEventListener("change", (e)=>{
  const wrap = document.getElementById("novaPropriedadeWrap");
  if(e.target.value === "__nova__"){
    wrap.classList.remove("oculto");
    document.getElementById("inputNovaPropriedade").focus();
  } else {
    wrap.classList.add("oculto");
  }
});

function propriedadeSelecionadaAtual(){
  const sel = document.getElementById("selectPropriedade").value;
  if(sel === "__nova__"){
    return document.getElementById("inputNovaPropriedade").value.trim();
  }
  return sel;
}

/* ---------- Busca de produto ---------- */
document.getElementById("buscaProduto").addEventListener("input", (e)=>{
  const termo = e.target.value.toLowerCase().trim();
  const caixa = document.getElementById("sugestoesProduto");
  if(termo.length < 2){ caixa.classList.add("oculto"); caixa.innerHTML=""; return; }

  const resultados = PRODUTOS.filter(p=>p.Produto.toLowerCase().includes(termo)).slice(0,30);
  if(resultados.length === 0){
    caixa.innerHTML = '<div class="sugestao-vazia">Nenhum produto encontrado</div>';
  } else {
    caixa.innerHTML = resultados.map(p=>`
      <div class="sugestao-item" data-produto="${p.Produto.replace(/"/g,'&quot;')}" data-unidade="${p.Unidade}">
        <span>${p.Produto}</span><span class="unidade-tag">${p.Unidade}</span>
      </div>`).join('');
  }
  caixa.classList.remove("oculto");
});

document.getElementById("sugestoesProduto").addEventListener("click", (e)=>{
  const item = e.target.closest(".sugestao-item");
  if(!item) return;
  produtoSelecionado = { Produto: item.getAttribute("data-produto"), Unidade: item.getAttribute("data-unidade") };
  document.getElementById("buscaProduto").value = produtoSelecionado.Produto;
  document.getElementById("sugestoesProduto").classList.add("oculto");
  document.getElementById("produtoChip").textContent = `${produtoSelecionado.Produto} (${produtoSelecionado.Unidade})`;
  document.getElementById("produtoSelecionadoWrap").classList.remove("oculto");
  document.getElementById("inputPreco").value = "";
  document.getElementById("inputVolume").value = "";
  atualizarTotalLinha();
});

document.addEventListener("click", (e)=>{
  const caixa = document.getElementById("sugestoesProduto");
  if(!caixa.contains(e.target) && e.target.id !== "buscaProduto"){
    caixa.classList.add("oculto");
  }
});

function atualizarTotalLinha(){
  const preco = parseFloat(document.getElementById("inputPreco").value) || 0;
  const volume = parseFloat(document.getElementById("inputVolume").value) || 0;
  document.getElementById("totalLinha").textContent = formatarMoeda(preco * volume);
}
document.getElementById("inputPreco").addEventListener("input", atualizarTotalLinha);
document.getElementById("inputVolume").addEventListener("input", atualizarTotalLinha);

document.getElementById("btnAdicionarItem").addEventListener("click", ()=>{
  limparMsg("msgLancamento");

  carrinho.push({
    Nome_Promotor: promotorAtual,
    Revenda: revendaAtual,
    Propriedade: propriedade,
    Produto: produtoSelecionado.Produto,
    Unidade: produtoSelecionado.Unidade,
    Preco_Unitario: preco,
    Volume: volume,
    Valor_Total: preco * volume,
    Dia_Lancamento: dataAtual,
    Quinzena: quinzenaAtual
  });

  produtoSelecionado = null;
  document.getElementById("buscaProduto").value = "";
  document.getElementById("produtoSelecionadoWrap").classList.add("oculto");
  atualizarCarrinho();
});

/* ---------- Carrinho ---------- */
function atualizarCarrinho(){
  document.getElementById("contadorItens").textContent = carrinho.length;
  const container = document.getElementById("listaCarrinho");
  container.innerHTML = carrinho.map((item, idx)=>`
    <div class="item-carrinho">
      <div class="item-carrinho-info">
        <b>${item.Propriedade}</b> — ${item.Produto} (${item.Unidade})<br>
        <span class="item-carrinho-detalhe">${item.Volume} x ${formatarMoeda(item.Preco_Unitario)} = <b>${formatarMoeda(item.Valor_Total)}</b></span>
      </div>
      <button class="btn-remover" data-idx="${idx}" type="button" title="Remover">×</button>
    </div>
  `).join("");
}

document.getElementById("listaCarrinho").addEventListener("click", (e)=>{
  const btn = e.target.closest(".btn-remover");
  if(!btn) return;
  const idx = Number(btn.getAttribute("data-idx"));
  carrinho.splice(idx, 1);
  atualizarCarrinho();
});

/* ---------- Envio ---------- */
document.getElementById("btnEnviar").addEventListener("click", async ()=>{
  limparMsg("msgLancamento");

  if(carrinho.length === 0){
    mostrarMsg("msgLancamento", "Adicione pelo menos um item antes de enviar.", "erro");
    return;
  }

  const overlay = document.getElementById("overlayCarregando");
  const btn = document.getElementById("btnEnviar");
  overlay.classList.remove("oculto");
  btn.disabled = true;

  try{
    const resp = await fetch(CONFIG.URL_API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": CONFIG.API_KEY
      },
      body: JSON.stringify({ lancamentos: carrinho })
    });
    if(!resp.ok) throw new Error("O servidor recusou o envio (status " + resp.status + ").");

    mostrarMsg("msgLancamento", `Lançamento enviado com sucesso! ${carrinho.length} item(ns) registrado(s) em ${formatarDataBR(dataAtual)}.`, "sucesso");
    carrinho = [];
    atualizarCarrinho();
    window.scrollTo({top:0, behavior:"smooth"});
  }catch(err){
    mostrarMsg("msgLancamento", "Erro ao enviar. Tente novamente em instantes. (" + err.message + ")", "erro");
  }finally{
    overlay.classList.add("oculto");
    btn.disabled = false;
  }
});

preencherPromotores();
</script>

</body>
</html>
