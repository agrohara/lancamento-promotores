<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Lançamento de Promotores</title>
<style>
  :root{
    --azul:#1f4e78;
    --azul-claro:#2e6da4;
    --cinza-fundo:#f4f6f8;
    --cinza-borda:#d9dee3;
    --texto:#22303c;
    --verde:#2e7d32;
    --vermelho:#c0392b;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--cinza-fundo);color:var(--texto);}
  header{background:var(--azul);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
  header h1{font-size:18px;margin:0;font-weight:600;}
  header .quem{font-size:13px;opacity:.85;}
  .container{max-width:760px;margin:0 auto;padding:16px;}
  .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px;}
  label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#44525c;}
  select, input[type=text], input[type=date]{
    width:100%;padding:12px 10px;font-size:16px;border:1px solid var(--cinza-borda);
    border-radius:8px;margin-bottom:16px;background:#fff;color:var(--texto);
  }
  select:focus, input:focus{outline:none;border-color:var(--azul-claro);}
  .btn{display:inline-block;width:100%;padding:14px;font-size:16px;font-weight:600;border:none;
    border-radius:10px;cursor:pointer;background:var(--azul);color:#fff;transition:background .15s;}
  .btn:hover{background:var(--azul-claro);}
  .btn:disabled{background:#9aa7b0;cursor:not-allowed;}
  .btn-secundario{background:#fff;color:var(--azul);border:1px solid var(--azul);}
  .btn-secundario:hover{background:#eef4fa;}
  .oculto{display:none !important;}
  .barra-busca{position:sticky;top:0;background:var(--cinza-fundo);padding:8px 0;z-index:5;}
  .linha-cliente{
    background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);
    margin-bottom:8px;padding:12px 14px;
  }
  .linha-cliente .topo-linha{display:flex;align-items:center;gap:12px;}
  .linha-cliente input[type=checkbox]{width:22px;height:22px;flex:0 0 22px;margin:0;}
  .linha-cliente .nome-cliente{font-weight:600;font-size:15px;flex:1;}
  .linha-cliente .campo-valor-wrap{margin-top:8px;padding-left:34px;display:none;}
  .linha-cliente.expandida .campo-valor-wrap{display:block;}
  .linha-cliente .campo-valor-wrap label{font-size:12px;margin-bottom:4px;}
  .linha-cliente input[type=number]{
    width:100%;padding:10px;font-size:16px;border:1px solid var(--cinza-borda);
    border-radius:8px;background:#fff;color:var(--texto);
  }
  .linha-cliente input[type=number]:focus{outline:none;border-color:var(--azul-claro);}
  .resumo{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:10px;
    padding:12px 16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);font-size:14px;}
  .resumo b{font-size:16px;color:var(--azul);}
  .msg{padding:12px 14px;border-radius:8px;font-size:14px;margin-bottom:14px;}
  .msg-erro{background:#fdecea;color:var(--vermelho);border:1px solid #f5c6c0;}
  .msg-sucesso{background:#eaf6ec;color:var(--verde);border:1px solid #bfe3c4;}
  .msg-info{background:#eaf2fb;color:var(--azul);border:1px solid #cfe0f3;}
  footer{text-align:center;font-size:11px;color:#8a97a1;padding:20px 0 40px;}
  .overlay-carregando{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;
    justify-content:center;font-size:15px;color:var(--azul);font-weight:600;z-index:50;}
  .contador{font-size:13px;color:#5b6771;margin:-6px 0 12px;}
</style>
</head>
<body>

<header>
  <h1>Lançamento de Promotores</h1>
  <div class="quem" id="cabecalhoPromotor"></div>
</header>

<div class="container">

  <!-- TELA 1: ACESSO -->
  <section id="telaAcesso" class="card">
    <div id="msgAcesso"></div>
    <label for="selectPromotor">Selecione seu nome</label>
    <select id="selectPromotor">
      <option value="">Selecione...</option>
    </select>

    <label for="inputData">Data do lançamento</label>
    <input type="date" id="inputData">

    <button class="btn" id="btnEntrar">Entrar</button>
  </section>

  <!-- TELA 2: LANÇAMENTO -->
  <section id="telaLancamento" class="oculto">
    <div class="resumo">
      <span>Data: <b id="resumoData"></b></span>
      <button class="btn btn-secundario" style="width:auto;padding:8px 14px;font-size:13px;" id="btnTrocar">Trocar</button>
    </div>

    <div id="msgLancamento"></div>

    <div class="barra-busca">
      <input type="text" id="buscaCliente" placeholder="Buscar cliente...">
    </div>
    <div class="contador"><span id="contadorSelecionados">0</span> cliente(s) marcado(s)</div>

    <div id="listaClientes"></div>

    <div class="card">
      <button class="btn" id="btnEnviar">Enviar lançamento</button>
    </div>
  </section>

</div>

<footer>Uso interno · Agro Hara</footer>
<div id="overlayCarregando" class="overlay-carregando oculto">Enviando...</div>

<script>
const CONFIG = {
  URL_API: "/api/lancamentos",
  API_KEY: "Marcelo9955@"
};

const PROMOTOR_CLIENTE = [{"Promotor": "AROLDO", "Cliente": "CASA RURAL AGROPECUARIA LOANDA LTDA"}, {"Promotor": "AROLDO", "Cliente": "EPA PIRES & PIRES LTDA"}, {"Promotor": "AROLDO", "Cliente": "GRACIOSA AGROPECUARIA LTDA"}, {"Promotor": "AROLDO", "Cliente": "GRUPO POMARO"}, {"Promotor": "AROLDO", "Cliente": "GRUPO VIUDES"}, {"Promotor": "AROLDO", "Cliente": "Projeto Lançamentos - AGD's - AROLDO"}, {"Promotor": "EMILY", "Cliente": "CLEISO CELLA & CIA LTDA  - ME"}, {"Promotor": "EMILY", "Cliente": "COASUL COOPERATIVA AGROINDUSTRIAL"}, {"Promotor": "EMILY", "Cliente": "COMERCIAL AGROVETERINARIA MALYS LTDA"}, {"Promotor": "EMILY", "Cliente": "H P AGRONUTRI COMERCIO E REPRESENTAÇÃO LTDA  - ME"}, {"Promotor": "EMILY", "Cliente": "Projeto Lançamentos - AGD's - EMILY"}, {"Promotor": "GABRIEL", "Cliente": "COOPERATIVA AGRICOLA MISTA SAO CRISTOVAO LTDA"}, {"Promotor": "GABRIEL", "Cliente": "Projeto Lançamentos - AGD's - GABRIEL"}, {"Promotor": "GABRIEL", "Cliente": "VALE NUTRICAO E SAUDE ANIMAL LTDA"}, {"Promotor": "GABRIEL S", "Cliente": "BOFF & BOFF LTDA"}, {"Promotor": "GABRIEL S", "Cliente": "CARLOS ROBERTO BUENO & CIA LTDA - ME"}, {"Promotor": "GABRIEL S", "Cliente": "COAGRO COOPERATIVA AGROINDUSTRIAL"}, {"Promotor": "GABRIEL S", "Cliente": "COOPERATIVA DE LEITE DA AGRICULTURA FAMILIAR DE SALTO DO LONTRA"}, {"Promotor": "GABRIEL S", "Cliente": "D. C. DE LIMA AGROCENTER EIRELI"}, {"Promotor": "GABRIEL S", "Cliente": "Projeto Lançamentos - AGD's - GABRIEL S"}, {"Promotor": "GIANCARLO", "Cliente": "COOPERATIVA DE DESENVOLVIMENTO E PRODUCAO AGROPECUARIA - CODEPA"}, {"Promotor": "GIANCARLO", "Cliente": "GRUPO PASQUALOTO"}, {"Promotor": "GIANCARLO", "Cliente": "MARTINS DISTRIBUIDORA DE PRODUTOS AGROPECUARIOS LTDA - ME"}, {"Promotor": "GIANCARLO", "Cliente": "Projeto Lançamentos - AGD's - GIANCARLO"}, {"Promotor": "JOAO TALES", "Cliente": "AGRO-MANICA COMERCIO E REPRESENTACOES DE PRODUTOS AGROPECUARIOS LTDA"}, {"Promotor": "JOAO TALES", "Cliente": "AGROPECUARIA APOEMA LTDA"}, {"Promotor": "JOAO TALES", "Cliente": "COAMIG AGROINDUSTRIAL COOPERATIVA"}, {"Promotor": "JOAO TALES", "Cliente": "D L DA SILVA LTDA"}, {"Promotor": "JOAO TALES", "Cliente": "FEMAGRI COMERCIO DE PRODUTOS AGROPECUARIOS LTDA"}, {"Promotor": "JOAO TALES", "Cliente": "GRUPO SIMIONATO"}, {"Promotor": "JOAO TALES", "Cliente": "Projeto Lançamentos - AGD's - JOAO TALES"}, {"Promotor": "KAUANA", "Cliente": "Projeto Lançamentos - AGD's - KAUANA"}, {"Promotor": "LEONARDO", "Cliente": "COAGRU COOPERATIVA AGROINDUSTRIAL UNIAO"}, {"Promotor": "LEONARDO", "Cliente": "KATUAGRO COMERCIO DE PRODUTOS AGROPECUARIOS LTDA - EPP"}, {"Promotor": "LEONARDO", "Cliente": "P BODNAR AGROPECUARIA - ME"}, {"Promotor": "LEONARDO", "Cliente": "Projeto Lançamentos - AGD's - LEONARDO"}, {"Promotor": "LEONARDO", "Cliente": "RANCHO DO LEITE"}, {"Promotor": "LUCAS", "Cliente": "COCARI - COOPERATIVA AGROPECUARIA E INDUSTRIAL"}, {"Promotor": "LUCAS", "Cliente": "COMERCIAL IBAITI"}, {"Promotor": "LUCAS", "Cliente": "GRUPO AGROCAMPO"}, {"Promotor": "LUCAS", "Cliente": "Projeto Lançamentos - AGD's - LUCAS"}, {"Promotor": "LUCAS", "Cliente": "RURAL NORTE DISTRIBUIDORA DE INSUMOS AGRICOLAS LTDA"}, {"Promotor": "LUCAS", "Cliente": "SOLUCAO PRODUTOS AGROPECUARIOS LTDA"}, {"Promotor": "MARIANA", "Cliente": "AGRO PECUARIA ALIANCA LTDA - EPP"}, {"Promotor": "MARIANA", "Cliente": "ARROBA NUTRICAO ANIMAL LTDA - EPP"}, {"Promotor": "MARIANA", "Cliente": "ASSOCIACAO DOS PRODUTORES DE LEITE DE PEROLA - APEROLEITE"}, {"Promotor": "MARIANA", "Cliente": "COOPERATIVA DOS PRODUTORES DE LEITE DO TERRITORIO ENTRE RIOS - COOPELE"}, {"Promotor": "MARIANA", "Cliente": "FABRICIO G. RAZENTE & CIA. LTDA."}, {"Promotor": "MARIANA", "Cliente": "Projeto Lançamentos - AGD's - MARIANA"}, {"Promotor": "PEDRO", "Cliente": "FELIPE MENEGAS ME"}, {"Promotor": "PEDRO", "Cliente": "GRUPO BRANDIELLI"}, {"Promotor": "PEDRO", "Cliente": "GRUPO GALERA"}, {"Promotor": "PEDRO", "Cliente": "OLADIR ANTONIO COMELLI LTDA"}, {"Promotor": "PEDRO", "Cliente": "Projeto Lançamentos - AGD's - PEDRO"}, {"Promotor": "PEDRO", "Cliente": "SIMIONATTO & SANSIGOLO LTDA"}, {"Promotor": "PEDRO", "Cliente": "TERRAGRZ COMERCIO DE PRODUTOS AGROPECUARIOS EIRELLE- ME"}, {"Promotor": "PEDRO", "Cliente": "VICTOR LUIZ ZAGO ME"}];

let promotorAtual = null;
let dataAtual = null;

function hojeISO(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}

function mostrarMsg(idContainer, texto, tipo){
  const el = document.getElementById(idContainer);
  const classe = tipo === "erro" ? "msg-erro" : tipo === "sucesso" ? "msg-sucesso" : "msg-info";
  el.innerHTML = `<div class="msg ${classe}">${texto}</div>`;
}
function limparMsg(idContainer){ document.getElementById(idContainer).innerHTML = ""; }

function preencherPromotores(){
  const promotores = [...new Set(PROMOTOR_CLIENTE.map(p => p.Promotor))].sort();
  const sel = document.getElementById("selectPromotor");
  promotores.forEach(p=>{
    const op = document.createElement("option");
    op.value = p; op.textContent = p;
    sel.appendChild(op);
  });
  document.getElementById("inputData").value = hojeISO();
}

document.getElementById("btnEntrar").addEventListener("click", ()=>{
  limparMsg("msgAcesso");
  const promotor = document.getElementById("selectPromotor").value;
  const data = document.getElementById("inputData").value;

  if(!promotor){ mostrarMsg("msgAcesso", "Selecione seu nome antes de continuar.", "erro"); return; }
  if(!data){ mostrarMsg("msgAcesso", "Selecione a data do lançamento.", "erro"); return; }

  promotorAtual = promotor;
  dataAtual = data;

  document.getElementById("cabecalhoPromotor").textContent = promotor;
  document.getElementById("resumoData").textContent = formatarDataBR(data);

  renderizarClientes(PROMOTOR_CLIENTE.filter(p=>p.Promotor === promotor));

  document.getElementById("telaAcesso").classList.add("oculto");
  document.getElementById("telaLancamento").classList.remove("oculto");
});

document.getElementById("btnTrocar").addEventListener("click", ()=>{
  document.getElementById("telaLancamento").classList.add("oculto");
  document.getElementById("telaAcesso").classList.remove("oculto");
  document.getElementById("cabecalhoPromotor").textContent = "";
  limparMsg("msgLancamento");
});

function formatarDataBR(iso){
  const [a,m,d] = iso.split("-");
  return `${d}/${m}/${a}`;
}

function renderizarClientes(clientes){
  const container = document.getElementById("listaClientes");
  container.innerHTML = clientes.map((c,i)=>`
    <div class="linha-cliente" data-cliente="${c.Cliente.replace(/"/g,'&quot;')}">
      <label class="topo-linha">
        <input type="checkbox" class="check-cliente">
        <span class="nome-cliente">${c.Cliente}</span>
      </label>
      <div class="campo-valor-wrap">
        <label>Valor de faturamento (R$)</label>
        <input type="number" class="campo-valor" min="0" step="0.01" placeholder="0,00">
      </div>
    </div>
  `).join("");
  document.querySelectorAll(".check-cliente").forEach(chk=>{
    chk.addEventListener("change", (e)=>{
      const linha = e.target.closest(".linha-cliente");
      linha.classList.toggle("expandida", e.target.checked);
      if(e.target.checked) linha.querySelector(".campo-valor").focus();
      atualizarContador();
    });
  });
  atualizarContador();
}

function atualizarContador(){
  const total = document.querySelectorAll(".check-cliente:checked").length;
  document.getElementById("contadorSelecionados").textContent = total;
}

document.getElementById("buscaCliente").addEventListener("input", (e)=>{
  const termo = e.target.value.toLowerCase().trim();
  document.querySelectorAll(".linha-cliente").forEach(linha=>{
    const nome = linha.querySelector(".nome-cliente").textContent.toLowerCase();
    linha.style.display = (!termo || nome.includes(termo)) ? "" : "none";
  });
});

document.getElementById("btnEnviar").addEventListener("click", async ()=>{
  limparMsg("msgLancamento");

  const linhasMarcadas = [...document.querySelectorAll(".linha-cliente")]
    .filter(linha => linha.querySelector(".check-cliente").checked);

  if(linhasMarcadas.length === 0){
    mostrarMsg("msgLancamento", "Marque pelo menos um cliente antes de enviar.", "erro");
    return;
  }

  let valorInvalidoEncontrado = false;
  const registros = [];

  linhasMarcadas.forEach(linha=>{
    const inputValor = linha.querySelector(".campo-valor");
    const valorTexto = inputValor.value;
    const valor = parseFloat(valorTexto);

    if(valorTexto === "" || isNaN(valor) || valor < 0){
      valorInvalidoEncontrado = true;
      inputValor.style.borderColor = "var(--vermelho)";
      return;
    }
    inputValor.style.borderColor = "";

    registros.push({
      Nome_Promotor: promotorAtual,
      Nome_Cliente: linha.getAttribute("data-cliente"),
      Dia_Lancamento: dataAtual,
      Valor_Faturamento: valor
    });
  });

  if(valorInvalidoEncontrado){
    mostrarMsg("msgLancamento", "Preencha um valor de faturamento válido (maior ou igual a zero) para cada cliente marcado.", "erro");
    return;
  }

  const overlay = document.getElementById("overlayCarregando");
  const btn = document.getElementById("btnEnviar");
  overlay.classList.remove("oculto");
  btn.disabled = true;

  try{
    const resp = await fetch(CONFIG.URL_API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": CONFIG.API_KEY
      },
      body: JSON.stringify({ lancamentos: registros })
    });
    if(!resp.ok) throw new Error("O servidor recusou o envio (status " + resp.status + ").");

    mostrarMsg("msgLancamento", `Lançamento enviado com sucesso! ${registros.length} cliente(s) registrado(s) em ${formatarDataBR(dataAtual)}.`, "sucesso");
    document.querySelectorAll(".check-cliente").forEach(c=>c.checked=false);
    document.querySelectorAll(".campo-valor").forEach(i=>{ i.value=""; i.style.borderColor=""; });
    document.querySelectorAll(".linha-cliente").forEach(l=>l.classList.remove("expandida"));
    atualizarContador();
    window.scrollTo({top:0, behavior:"smooth"});
  }catch(err){
    mostrarMsg("msgLancamento", "Erro ao enviar. Tente novamente em instantes. (" + err.message + ")", "erro");
  }finally{
    overlay.classList.add("oculto");
    btn.disabled = false;
  }
});

preencherPromotores();
</script>

</body>
</html>
